<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amplifi — Build your child's financial future</title>
    <meta name="description" content="Amplifi helps UK parents and grandparents invest for the long term — from a child's first pound to their first home deposit. Join the waitlist today." />
    <meta property="og:title" content="Amplifi — Build your child's financial future" />
    <meta property="og:description" content="Amplifi helps UK families invest for the long term. Join the waitlist." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <!-- Netlify Forms detection: homepage waitlist -->
    <form name="waitlist" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="interest">
        <option value="spark">Spark</option>
        <option value="launchpad">Launchpad</option>
        <option value="both">Both</option>
        <option value="not-sure">Not sure yet</option>
      </select>
    </form>
    <!-- Netlify Forms detection: plan journey -->
    <form name="amplifi-plan" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="email" name="email" />
      <input type="password" name="password" />
      <input type="text" name="childName" />
      <input type="text" name="dobDay" />
      <input type="text" name="dobMonth" />
      <input type="text" name="dobYear" />
      <input type="text" name="gender" />
      <input type="text" name="familyContrib" />
      <input type="text" name="housingStatus" />
      <input type="text" name="childBenefit" />
      <input type="text" name="giftSpend" />
      <input type="text" name="cashback" />
      <input type="text" name="monthly" />
      <input type="text" name="projectedValue" />
    </form>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
